# ESP32 Timelapse Box trigger contract.
#
# Keep the legacy macro until a future major release. Both public macros expose
# the same sequence so old and new ESP32 firmware can observe one event.

[gcode_macro _ESP_TIMELAPSE_EVENT]
description: Internal shared counter for ESP32 Timelapse Box trigger aliases.
variable_seq: 0
gcode:
  {% set next_seq = printer["gcode_macro _ESP_TIMELAPSE_EVENT"].seq|int + 1 %}
  SET_GCODE_VARIABLE MACRO=_ESP_TIMELAPSE_EVENT VARIABLE=seq VALUE={next_seq}
  SET_GCODE_VARIABLE MACRO=ESP_TIMELAPSE_SHOT VARIABLE=seq VALUE={next_seq}
  SET_GCODE_VARIABLE MACRO=CYBERBRICK_SHOT VARIABLE=seq VALUE={next_seq}
  RESPOND PREFIX=ESP32_TIMELAPSE MSG="shot_seq={next_seq}"

[gcode_macro ESP_TIMELAPSE_SHOT]
description: Request one ESP32 Timelapse Box frame.
variable_seq: 0
gcode:
  _ESP_TIMELAPSE_EVENT

[gcode_macro CYBERBRICK_SHOT]
description: Deprecated compatibility alias for ESP_TIMELAPSE_SHOT.
variable_seq: 0
gcode:
  _ESP_TIMELAPSE_EVENT
