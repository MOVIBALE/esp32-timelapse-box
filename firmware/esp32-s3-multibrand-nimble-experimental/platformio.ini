[platformio]
src_dir = src

[env:esp32-s3-devkitc-1]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
lib_deps =
  h2zero/NimBLE-Arduino@2.5.0
build_flags =
  -D MULTIBRAND_NIMBLE_EXPERIMENTAL=1
  -D FURBLE_VERSION=\"3.9.0-246de086\"
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -Wall
  -Wextra
lib_ldf_mode = deep+
