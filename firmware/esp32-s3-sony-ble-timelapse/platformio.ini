[platformio]
src_dir = main

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
monitor_speed = 115200
board_build.partitions = partitions.csv
build_flags =
  -D LIVE_SHUTTER_BLUEDROID_PROBE=1
  -D SHUTTER_TEST_USER_APPROVED=1
  -D SERIAL_TRIGGER_REQUIRED=1
  -D KLIPPER_SONY_TIMELAPSE_BOX=1
  -D TIMELAPSE_DRY_RUN_DEFAULT=1
  -D TIMELAPSE_SERIAL_ARM_REQUIRED=1
  -D TIMELAPSE_MOONRAKER_HOST=\"printer.local\"
