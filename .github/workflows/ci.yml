name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python test and firmware tools
        run: python -m pip install --disable-pip-version-check pytest platformio

      - name: Test browser configurator
        run: npm --prefix apps/klipper-timelapse-configurator test

      - name: Test public JavaScript contracts
        run: >-
          node --test
          tests/esp32_klipper_sony_timelapse.test.mjs
          tests/esp32_timelapse_macro.test.mjs
          tests/docs_public_contract.test.mjs
          tests/public_release_builder.test.mjs
          tests/repository_publication_policy.test.mjs

      - name: Test compatible ESP32-C3 route
        run: >-
          python -m pytest -q
          tests/test_board_file_contents.py
          tests/test_board_listener.py
          tests/test_cyberbrick_fs.py
          tests/test_esp32_timelapse_fs.py
          tests/test_moonraker_agent_protocol.py

      - name: Check public configurator package
        run: npm --prefix apps/klipper-timelapse-configurator run release:check

      - name: Build ESP32-S3 firmware
        run: node scripts/build-s3-firmware.mjs

      - name: Build release assets
        run: node scripts/build-public-release.mjs

      - name: Verify release checksums
        working-directory: release/v0.1.0
        run: sha256sum --check SHA256SUMS.txt
